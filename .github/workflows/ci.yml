name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (lint & test)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Lint
        run: |
          python -m flake8 --config .flake8 backend/app backend/tests
          python -m black --config pyproject.toml --check backend/app backend/tests
          python -m isort --settings-path pyproject.toml --check-only backend/app backend/tests

      - name: Run tests
        run: python -m pytest backend/tests

